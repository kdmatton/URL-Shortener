<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .toast-container { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast { min-width: 320px; font-size: 1rem; font-weight: 500; box-shadow: 0 6px 24px rgba(0,0,0,0.18); }
        .toast-body { padding: 16px 20px; }
    </style>
    <style>
        body {
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 440px;
        }
        .card-header {
            background-color: #1a3a5c;
            color: white;
            border-radius: 12px 12px 0 0 !important;
            padding: 20px 24px;
        }
        .card-header.register {
            background-color: #2e7d52;
        }
        .btn-register {
            background-color: #2e7d52;
            border-color: #2e7d52;
            color: white;
        }
        .btn-register:hover {
            background-color: #255f3f;
            border-color: #255f3f;
            color: white;
        }
        .tab-link.register-link {
            color: #2e7d52;
        }
        .btn-primary {
            background-color: #1a3a5c;
            border-color: #1a3a5c;
        }
        .btn-primary:hover {
            background-color: #15304d;
            border-color: #15304d;
        }
        .btn-outline-secondary {
            color: #1a3a5c;
            border-color: #1a3a5c;
        }
        .btn-outline-secondary:hover {
            background-color: #1a3a5c;
            color: white;
        }
        .short-url-box {
            background-color: #e8edf2;
            border-radius: 8px;
            padding: 12px 16px;
            word-break: break-all;
        }
        .short-url-box a {
            color: #1a3a5c;
            font-weight: 500;
            text-decoration: none;
        }
        .short-url-box a:hover {
            text-decoration: underline;
        }
        .alert { border-radius: 8px; }
        .tab-link {
            color: #1a3a5c;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Toast -->
    <div class="toast-container">
        <div id="login-toast" class="toast align-items-center text-white border-0" role="alert" style="background-color:#4caf7d;">
            <div class="d-flex">
                <div class="toast-body">Welcome back! You're signed in.</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
        <div id="logout-toast" class="toast align-items-center text-white border-0" role="alert" style="background-color:#f0924a;">
            <div class="d-flex">
                <div class="toast-body">You've been logged out.</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <div class="card">
        <!-- Auth View -->
        <div id="auth-view">
            <div class="card-header">
                <h5 class="mb-0" id="auth-title">Login</h5>
            </div>
            <div class="card-body p-4">
                <div id="auth-alert" class="alert d-none"></div>

                <div class="mb-3">
                    <label class="form-label text-muted small">Email</label>
                    <input type="email" id="auth-email" class="form-control" placeholder="you@example.com">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small">Password</label>
                    <input type="password" id="auth-password" class="form-control" placeholder="••••••••">
                </div>

                <button id="auth-btn" class="btn btn-primary w-100 mb-3">Login</button>
                <p class="text-center text-muted small mb-0">
                    <span id="auth-switch-text">Don't have an account?</span>
                    <span class="tab-link ms-1" id="auth-switch-link">Register</span>
                </p>
            </div>
        </div>

        <!-- Shorten View -->
        <div id="shorten-view" class="d-none">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">URL Shortener</h5>
                <button class="btn btn-sm btn-outline-light" id="logout-btn">Logout</button>
            </div>
            <div class="card-body p-4">
                <div id="shorten-alert" class="alert d-none"></div>

                <div class="mb-3">
                    <label class="form-label text-muted small">Long URL</label>
                    <input type="url" id="url-input" class="form-control" placeholder="https://example.com/very/long/url">
                </div>
                <button id="shorten-btn" class="btn btn-primary w-100 mb-4">Shorten</button>

                <div id="result" class="d-none">
                    <p class="text-muted small mb-2">Your short URL</p>
                    <div class="short-url-box d-flex justify-content-between align-items-center">
                        <a id="short-url-link" href="#" target="_blank"></a>
                        <button class="btn btn-sm btn-outline-secondary ms-2" id="copy-btn">Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = 'http://localhost:8000';
        let accessToken = localStorage.getItem('accessToken');
        let isLogin = true;

        const authView = document.getElementById('auth-view');
        const shortenView = document.getElementById('shorten-view');
        const authAlert = document.getElementById('auth-alert');
        const shortenAlert = document.getElementById('shorten-alert');

        function showAlert(el, message, type = 'danger') {
            el.className = `alert alert-${type}`;
            el.textContent = message;
            el.classList.remove('d-none');
        }

        function hideAlert(el) {
            el.classList.add('d-none');
        }

        function showView() {
            if (accessToken) {
                authView.classList.add('d-none');
                shortenView.classList.remove('d-none');
            } else {
                authView.classList.remove('d-none');
                shortenView.classList.add('d-none');
            }
        }

        function setAuthMode(login) {
            isLogin = login;
            const header = document.querySelector('#auth-view .card-header');
            const btn = document.getElementById('auth-btn');
            const link = document.getElementById('auth-switch-link');
            document.getElementById('auth-title').textContent = login ? 'Login' : 'Register';
            btn.textContent = login ? 'Login' : 'Register';
            document.getElementById('auth-switch-text').textContent = login ? "Don't have an account?" : 'Already have an account?';
            link.textContent = login ? 'Register' : 'Login';
            header.classList.toggle('register', !login);
            btn.classList.toggle('btn-primary', login);
            btn.classList.toggle('btn-register', !login);
            link.classList.toggle('register-link', !login);
        }

        // Toggle login/register
        document.getElementById('auth-switch-link').addEventListener('click', () => {
            hideAlert(authAlert);
            setAuthMode(!isLogin);
        });

        // Login / Register
        document.getElementById('auth-btn').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            hideAlert(authAlert);

            const endpoint = isLogin ? '/auth/login' : '/auth/register';

            try {
                const res = await fetch(`${API}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) return showAlert(authAlert, data.message);

                if (isLogin) {
                    accessToken = data.accessToken;
                    localStorage.setItem('accessToken', accessToken);
                    showView();
                    const toast = new bootstrap.Toast(document.getElementById('login-toast'), { delay: 3000 });
                    toast.show();
                } else {
                    showAlert(authAlert, 'Account created! You can now login.', 'success');
                    setAuthMode(true);
                }
            } catch {
                showAlert(authAlert, 'Something went wrong. Is the server running?');
            }
        });

        // Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            accessToken = null;
            localStorage.removeItem('accessToken');
            document.getElementById('result').classList.add('d-none');
            hideAlert(shortenAlert);
            showView();
            const toast = new bootstrap.Toast(document.getElementById('logout-toast'), { delay: 3000 });
            toast.show();
        });

        // Shorten
        document.getElementById('shorten-btn').addEventListener('click', async () => {
            const url = document.getElementById('url-input').value.trim();
            hideAlert(shortenAlert);
            document.getElementById('result').classList.add('d-none');

            if (!url) return showAlert(shortenAlert, 'Please enter a URL');

            try {
                const res = await fetch(`${API}/shorten`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();

                if (res.status === 401) {
                    accessToken = null;
                    localStorage.removeItem('accessToken');
                    showView();
                    return;
                }

                if (!res.ok) return showAlert(shortenAlert, data.message);

                const link = document.getElementById('short-url-link');
                link.href = data.shortUrl;
                link.textContent = data.shortUrl;
                document.getElementById('result').classList.remove('d-none');
            } catch {
                showAlert(shortenAlert, 'Something went wrong. Is the server running?');
            }
        });

        // Copy
        document.getElementById('copy-btn').addEventListener('click', () => {
            const url = document.getElementById('short-url-link').textContent;
            navigator.clipboard.writeText(url);
            document.getElementById('copy-btn').textContent = 'Copied!';
            setTimeout(() => document.getElementById('copy-btn').textContent = 'Copy', 2000);
        });

        showView();
    </script>
</body>
</html>
