<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="icon" type="image/x-icon" href="image.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Toast -->
    <div class="toast-container">
        <div id="login-toast" class="toast align-items-center text-white border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">Welcome back! You're signed in.</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
        <div id="logout-toast" class="toast align-items-center text-white border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">You've been logged out.</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <div class="card">
        <!-- Auth View -->
        <div id="auth-view">
            <div class="card-header">
                <h5 class="mb-0" id="auth-title">Login</h5>
            </div>
            <div class="card-body p-4">
                <div id="auth-alert" class="alert d-none"></div>

                <div class="mb-3">
                    <label class="form-label text-muted small">Email</label>
                    <input type="email" id="auth-email" class="form-control" placeholder="you@example.com">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small">Password</label>
                    <input type="password" id="auth-password" class="form-control" placeholder="••••••••">
                </div>

                <button id="auth-btn" class="btn btn-primary w-100 mb-3">Login</button>
                <p class="text-center text-muted small mb-0">
                    <span id="auth-switch-text">Don't have an account?</span>
                    <span class="tab-link ms-1" id="auth-switch-link">Register</span>
                </p>
            </div>
        </div>

        <!-- Shorten View -->
        <div id="shorten-view" class="d-none">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">URL Shortener</h5>
                <button class="btn btn-sm btn-outline-light" id="logout-btn">Logout</button>
            </div>
            <div class="card-body p-4">
                <div id="shorten-alert" class="alert d-none"></div>

                <div class="mb-3">
                    <label class="form-label text-muted small">Long URL</label>
                    <input type="url" id="url-input" class="form-control" placeholder="https://example.com/very/long/url">
                </div>
                <button id="shorten-btn" class="btn btn-primary w-100 mb-4">Shorten</button>

                <div id="result" class="d-none">
                    <p class="text-muted small mb-2">Your short URL</p>
                    <div class="short-url-box d-flex justify-content-between align-items-center">
                        <a id="short-url-link" href="#" target="_blank"></a>
                        <button class="btn btn-sm btn-outline-secondary ms-2" id="copy-btn">Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
